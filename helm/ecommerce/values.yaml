replicaCount: 2

image:
  repository: your-dockerhub-username/ecommerce-app
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: NodePort
  port: 80
  targetPort: 3000
  nodePort: 30300   # mapped to hostPort 30300 in kind-config.yaml
                    # access via http://localhost:30300

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: ecommerce.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env:
  PORT: "3000"
  APP_VERSION: "1.0.0"

livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
